name: Deploy SystemD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configura SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy na VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /root/SystemD

            git pull origin main

            docker compose -f docker-compose.prod.yml build frontend-builder backend

            docker compose -f docker-compose.prod.yml run --rm frontend-builder

            docker compose -f docker-compose.prod.yml up -d --remove-orphans backend nginx

            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --no-input
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --no-input --clear
          '

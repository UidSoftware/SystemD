name: Deploy SystemD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /root/SytemD

            git pull origin main

            docker compose -f docker-compose.prod.yml build frontend-builder backend

            docker compose -f docker-compose.prod.yml up frontend-builder

            docker compose -f docker-compose.prod.yml up -d --no-deps --no-build backend nginx

            docker exec sytemd-backend-1 python manage.py migrate --no-input
            docker exec sytemd-backend-1 python manage.py collectstatic --no-input --clear

# actions ok

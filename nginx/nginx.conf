upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /static/ {
        alias /static/;
    }

    # SW killed
    location = /sw.js { return 404; }
    location ~* ^/workbox-.+\.js$ { return 404; }
    location = /registerSW.js { return 404; }

    # clear-sw helper
    location = /clear-sw {
        add_header Content-Type 'text/html; charset=utf-8';
        add_header Cache-Control 'no-store';
        return 200 '<!DOCTYPE html><html><body><p>Limpando SW...</p><script>navigator.serviceWorker.getRegistrations().then(function(r){return Promise.all(r.map(function(x){return x.unregister();}));}).then(function(){window.location.replace("/sistema/");});</script></body></html>';
    }

    # index.html nunca cacheado
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
